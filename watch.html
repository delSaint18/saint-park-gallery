<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAINTPARK — now playing</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("sp-theme")||"day")}catch(e){}</script>
</head>
<body>

<div id="tvstatic" aria-hidden="true"></div>
<div id="tvroll" aria-hidden="true"></div>
<div class="topnav">
  <div class="bar">
    <a class="mark" href="./" aria-label="SAINTPARK home"><span class="saint">SAINT</span><span class="park">PARK</span></a>
    <nav aria-label="Site">
      <a href="./">The Park</a>
      <a href="gallery.html" aria-current="page">Gallery</a>
      <a href="kids/">Play</a>
      <a href="about.html">About</a>
      <a href="#" id="theme-toggle" title="Toggle day / night">☾ Night</a>
      <a class="book" href="mailto:delsaintprod@gmail.com?subject=Saint%20Park%20commission">Book a piece</a>
    </nav>
  </div>
</div>

<main class="wrap" style="padding-top:26px; padding-bottom:60px">
  <div class="video-wrap" id="videoWrap">
    <p class="fallback" id="fallback" hidden>Couldn't find that video — <a href="gallery.html" style="color:inherit">head back to the gallery</a>.</p>
  </div>
  <div class="watch-meta">
    <span class="badge">MP4</span>
    <h1 id="title">Loading…</h1>
    <p class="by" id="by" hidden></p>
    <p class="blurb" id="blurb" hidden></p>
    <p class="year" id="year" hidden></p>
  </div>
</main>

<footer>
  <div class="wrap">
    <nav class="foot-nav" aria-label="Footer">
      <a href="./">The Park</a>
      <a href="gallery.html">← back to the gallery</a>
      <a href="kids/">Play</a>
      <a href="about.html">About</a>
    </nav>
    <p class="fine">SAINTPARK · every piece is a song</p>
  </div>
</footer>

<script src="site.js"></script>
<script>
(function(){
"use strict";
var q = new URLSearchParams(location.search);
var id = q.get("v");
var externalUrl = q.get("u");
var title = q.get("t");
var artist = q.get("a");
var blurb = q.get("b");
var year = q.get("y");

document.title = "SAINTPARK — " + (title || "now playing");
document.getElementById("title").textContent = title || "Now playing";
if (artist){ var by = document.getElementById("by"); by.textContent = "by " + artist; by.hidden = false; }
if (blurb){ var b = document.getElementById("blurb"); b.textContent = blurb; b.hidden = false; }
if (year){ var y = document.getElementById("year"); y.textContent = year; y.hidden = false; }

var wrap = document.getElementById("videoWrap");
if (id){
  var iframe = document.createElement("iframe");
  iframe.src = "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(id) + "?rel=0";
  iframe.title = title || "SAINTPARK video";
  iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
  iframe.allowFullscreen = true;
  iframe.loading = "lazy";
  wrap.appendChild(iframe);
} else if (externalUrl){
  location.replace(externalUrl);
} else {
  document.getElementById("fallback").hidden = false;
  document.getElementById("title").textContent = "Video not found";
}
})();
</script>
</body>
</html>
