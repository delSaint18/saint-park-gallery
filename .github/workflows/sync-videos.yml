name: Sync videos from YouTube

on:
  schedule:
    - cron: "0 13 * * *"   # daily, ~9am US Eastern (adjust the hour if you'd like)
  workflow_dispatch: {}     # adds a "Run workflow" button on the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync videos.txt from the channel feed
        run: python3 scripts/sync_videos.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "saintpark-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- videos.txt; then
            git add videos.txt
            git commit -m "Auto-sync videos from YouTube channel"
            git push
          else
            echo "No changes — videos.txt already up to date."
          fi
